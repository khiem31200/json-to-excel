services:
  app:
    image: 683449654920.dkr.ecr.ap-southeast-1.amazonaws.com/my-application:latest
    container_name: json-to-excel-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://root:1234@mongo:27017/jsontoexcel?authSource=admin
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - mongo
      - redis
      - kafka
    restart: always
    volumes:
      - ../log:/app/log
  mongo:
    image: mongo
    restart: always
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 1234

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:1234@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: 1234

  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"

  # Kafka (KRaft mode - không cần Zookeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      # Tăng max message size lên 10MB (default 1MB) để nhận batch lớn
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
  # 1. ELASTICSEARCH: Lưu trữ Logs + Traces (APM)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false          # Tắt security cho local dev
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m        # Giới hạn RAM cho local dev
      - cluster.name=elk-local
    ports:
      - "9200:9200"
      # 9300 (transport) không cần expose vì chạy single-node
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 30

  # 2. KIBANA: Giao diện tìm kiếm Log + APM UI
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - xpack.encryptedSavedObjects.encryptionKey=something-at-least-32-characters!!
      - xpack.apm.ui.enabled=true
      - xpack.observability.logsLocator.enabled=true
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  # 3. APM SERVER: Thu thập Traces từ Spring Boot (qua OTLP) → đẩy vào Elasticsearch
  apm-server:
    image: docker.elastic.co/apm/apm-server:8.17.0
    container_name: apm-server
    cap_add: ["CHOWN", "DAC_OVERRIDE", "SETGID", "SETUID"]
    cap_drop: ["ALL"]
    ports:
      - "8200:8200"    # APM intake API + OTLP HTTP
    command: >
      apm-server -e
        -E apm-server.host=0.0.0.0:8200
        -E apm-server.rum.enabled=true
        -E setup.kibana.host=kibana:5601
        -E setup.template.settings.index.number_of_replicas=0
        -E apm-server.kibana.enabled=true
        -E apm-server.kibana.host=kibana:5601
        -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_started

  # 3b. ELASTICSEARCH SETUP: Tạo ingest pipeline để reroute logs → logs-*-* data stream
  # Chạy 1 lần sau khi Elasticsearch healthy, sau đó tắt
  elasticsearch-setup:
    image: curlimages/curl:latest
    container_name: elasticsearch-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"
    command: >
      sh -c "
        echo '=== Creating Elasticsearch ingest pipeline ===';
        curl -s -X PUT 'http://elasticsearch:9200/_ingest/pipeline/filebeat-to-logs-reroute'
          -H 'Content-Type: application/json'
          -d '{
            \"description\": \"Route filebeat logs to logs-json_to_excel-default data stream for Kibana APM trace-log correlation\",
            \"processors\": [
              {
                \"set\": {
                  \"field\": \"_index\",
                  \"value\": \"logs-json_to_excel-default\",
                  \"override\": true
                }
              }
            ]
          }';
        echo '';
        echo '=== Elasticsearch setup complete! ==='
      "

  # 2b. KIBANA SETUP: Tạo data view + visualizations + dashboard
  # Chạy 1 lần sau khi Kibana khởi động
  kibana-setup:
    image: python:3-alpine
    container_name: kibana-setup
    depends_on:
      kibana:
        condition: service_started
      elasticsearch-setup:
        condition: service_completed_successfully
    restart: "no"
    volumes:
      - ./config/setup-kibana.py:/tmp/setup-kibana.py:ro
    command: python /tmp/setup-kibana.py

  # 4. FILEBEAT: Thu thập log files từ Spring Boot → đẩy vào Elasticsearch data stream
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.0
    container_name: filebeat
    user: root    # Cần root để đọc log files
    command: filebeat -e --strict.perms=false
    volumes:
      - ./config/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ../log:/var/log/app:ro              # Mount thư mục log của Spring Boot
      - filebeat_data:/usr/share/filebeat/data  # Lưu vị trí đã đọc (registry)
    depends_on:
      elasticsearch:
        condition: service_healthy
      elasticsearch-setup:
        condition: service_completed_successfully

volumes:
  esdata:
    driver: local
  filebeat_data:
    driver: local